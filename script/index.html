<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>Resgate de vidas - Criança feliz</title>
</head>

<body>

    <header>
        <div class="logo">
            <img src="img/logo.png" alt="Logo do Site">
        </div>
        <nav id="secoes">
            <ul class="nav-links">
                <li><a href="#">Sobre nós</a></li>
                <li><a href="#">Impactos</a></li>
                <li><a href="#">Galeria</a></li>
                <li><a href="#">Como apoiar</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
        <nav>
            <ul class="nav-links">
                <li><a href="">Faça sua doação</a></li>
            </ul>
        </nav>
    </header>

    <div class="slider">
        <div class="slides">
            <input type="radio" name="radio-btn" id="radio1" checked>
            <input type="radio" name="radio-btn" id="radio2">
            <input type="radio" name="radio-btn" id="radio3">

            <div class="slide first">
                <img src="img/1.png" alt="Slide 1">
            </div>
            <div class="slide">
                <img src="img/2.png" alt="Slide 2">
            </div>
            <div class="slide">
                <img src="img/3.png" alt="Slide 3">
            </div>

            <div class="navigation-auto">
                <div class="auto-btn1"></div>
                <div class="auto-btn2"></div>
                <div class="auto-btn3"></div>
            </div>
        </div>

        <div class="navigation-manual">
            <label for="radio1" class="manual-btn"></label>
            <label for="radio2" class="manual-btn"></label>
            <label for="radio3" class="manual-btn"></label>
        </div>
    </div>

</body>

</html>
